<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Monopoly Go Ultra 3D</title>
<style>
:root {
  --gold: #FFD700; --m-green: #27AE60; --m-red: #E74C3C; --m-blue: #2980B9;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Arial Rounded MT Bold', sans-serif; }
body { background: radial-gradient(circle, #1e3c72, #2a5298); color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

/* HUD */
#hud { position: fixed; top: 10px; width: 100%; padding: 15px; display: flex; justify-content: space-between; z-index: 100; }
.stat { background: rgba(0,0,0,0.7); padding: 12px 25px; border-radius: 40px; border: 3px solid var(--gold); font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

/* 3D Szene */
#view { perspective: 1200px; flex: 1; display: flex; justify-content: center; align-items: center; margin-top: 40px; }
#board-container { 
    width: 380px; height: 380px; 
    transform: rotateX(50deg) rotateZ(-20deg); 
    transform-style: preserve-3d; 
    position: relative;
}
.board { 
    display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr); 
    width: 100%; height: 100%; background: #e8f5e9; border: 8px solid #2c3e50;
    box-shadow: 0 0 50px rgba(0,0,0,0.5);
}

/* Felder-Styling */
.cell { border: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; font-size: 7px; position: relative; background: #fff; color: #333; overflow: visible; }
.color-bar { width: 100%; height: 25%; border-bottom: 1px solid rgba(0,0,0,0.2); }

/* Haus-Modelle (3D-Effekt mit CSS) */
.house { 
    width: 12px; height: 12px; background: #2ecc71; position: absolute; bottom: 2px; 
    transform: translateZ(10px); border: 1px solid #145a32; box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
}
.hotel { 
    width: 16px; height: 16px; background: #e74c3c; position: absolute; bottom: 2px; 
    transform: translateZ(15px); border: 1px solid #7b241c; 
}

/* Spielfigur */
#player { 
    width: 26px; height: 26px; background: radial-gradient(circle at 30% 30%, #ff4b2b, #ff416c); 
    border-radius: 50%; position: absolute; z-index: 50; 
    transform: translateZ(20px); box-shadow: 0 15px 15px rgba(0,0,0,0.6);
    transition: left 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* UI */
#ui { position: fixed; bottom: 40px; width: 100%; display: flex; flex-direction: column; align-items: center; }
.go-btn { 
    width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(#f1c40f, #f39c12); 
    border: none; border-bottom: 8px solid #a47c00; font-weight: bold; font-size: 24px; color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3); cursor: pointer;
}
.go-btn:active { transform: translateY(4px); border-bottom: 2px solid #a47c00; }

#msg-box { position: fixed; top: 120px; width: 100%; text-align: center; pointer-events: none; z-index: 1000; }
.msg { background: white; color: #333; padding: 15px 30px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: inline-block; transform: scale(0); transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
.msg.show { transform: scale(1); }

@keyframes jump { 0%, 100% { transform: translateZ(20px); } 50% { transform: translateZ(60px) scale(1.3); } }
.jumping { animation: jump 0.3s ease-in-out; }
</style>
</head>
<body>

<div id="hud">
    <div class="stat">💰 <b id="money">1500</b></div>
    <div class="stat">🎲 <b id="dice">50</b></div>
</div>

<div id="msg-box"><div id="msg" class="msg">WILLKOMMEN!</div></div>

<div id="view">
    <div id="board-container">
        <div id="player"></div>
        <div class="board" id="board"></div>
    </div>
</div>

<div id="ui">
    <button class="go-btn" onclick="playTurn()">GO!</button>
</div>
