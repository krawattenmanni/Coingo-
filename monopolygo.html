<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monopoly GO 3D Clone</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#000;
}

/* UI Overlay */
#ui{
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
  color:white;
}

button{
  padding:12px 20px;
  font-size:18px;
  font-weight:bold;
  border:none;
  border-radius:10px;
  background:gold;
  cursor:pointer;
}

#stats{
  margin-bottom:10px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
  <div id="stats">🪙 1000 | 🎲 30</div>
  <button onclick="rollDice()">🎲 Würfeln</button>
</div>

<script>
let scene, camera, renderer;
let player, tiles=[];
let G = { coins:1000, dice:30, pos:0 };

// INIT
init();

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0,10,12);

  renderer = new THREE.WebGLRenderer({canvas:document.getElementById("game"), antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);

  // Licht
  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(10,20,10);
  scene.add(light);

  const ambient = new THREE.AmbientLight(0xffffff,0.6);
  scene.add(ambient);

  createBoard();
  createPlayer();

  animate();
}

// BOARD
function createBoard(){
  for(let i=0;i<36;i++){
    const geo = new THREE.BoxGeometry(1,0.2,1);
    const mat = new THREE.MeshStandardMaterial({color:0x8B6914});
    const tile = new THREE.Mesh(geo,mat);

    let angle = (i/36)*Math.PI*2;
    tile.position.set(Math.cos(angle)*5,0,Math.sin(angle)*5);

    scene.add(tile);
    tiles.push(tile);
  }
}

// PLAYER
function createPlayer(){
  const geo = new THREE.SphereGeometry(0.3);
  const mat = new THREE.MeshStandardMaterial({color:0xffd700});
  player = new THREE.Mesh(geo,mat);

  scene.add(player);
  updatePlayer();
}

// UPDATE PLAYER POS
function updatePlayer(){
  let t = tiles[G.pos];
  player.position.set(t.position.x,0.5,t.position.z);
}

// DICE
function rollDice(){
  if(G.dice<=0){
    alert("Keine Würfel!");
    return;
  }

  G.dice--;

  let d1 = Math.ceil(Math.random()*6);
  let d2 = Math.ceil(Math.random()*6);

  let steps = d1+d2;

  movePlayer(steps);

  updateUI();
}

// MOVE
function movePlayer(steps){
  let target = (G.pos + steps) % 36;

  animateMove(G.pos, target);
}

// SMOOTH MOVE
function animateMove(from, to){
  let i = from;

  function step(){
    if(i === to){
      land();
      return;
    }

    i = (i+1)%36;
    G.pos = i;
    updatePlayer();

    setTimeout(step,200);
  }

  step();
}

// LAND EVENT
function land(){
  let reward = Math.floor(100 + Math.random()*300);
  G.coins += reward;
  showFloating("+🪙"+reward);
  updateUI();
}

// FLOATING TEXT
function showFloating(text){
  let div = document.createElement("div");
  div.innerText = text;
  div.style.position="absolute";
  div.style.left="50%";
  div.style.top="50%";
  div.style.color="gold";
  div.style.fontSize="24px";
  div.style.transform="translate(-50%,-50%)";
  div.style.animation="fade 1s forwards";

  document.body.appendChild(div);

  setTimeout(()=>div.remove(),1000);
}

// UI
function updateUI(){
  document.getElementById("stats").innerText =
    "🪙 "+G.coins+" | 🎲 "+G.dice;
}

// CAMERA FOLLOW
function animate(){
  requestAnimationFrame(animate);

  if(player){
    camera.position.lerp(
      new THREE.Vector3(player.position.x,8,player.position.z+8),
      0.05
    );
    camera.lookAt(player.position);
  }

  renderer.render(scene,camera);
}

// RESIZE
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

<style>
@keyframes fade{
  from{opacity:1; transform:translate(-50%,-50%) scale(1);}
  to{opacity:0; transform:translate(-50%,-120%) scale(0.5);}
}
</style>

</body>
</html>
